<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human–AI Trust Researc</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-orbs">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="app">
      <header class="topbar">
        <div class="logo-wrap">
          <div class="logo-mark">
            <svg viewBox="0 0 16 16" fill="none">
              <circle cx="8" cy="8" r="6" stroke="white" stroke-width="1.5" />
              <path
                d="M8 5v3.5l2.5 1.5"
                stroke="white"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
          </div>
          <div>
            <div class="logo-text">Human–AI Trust Research</div>
          </div>
        </div>
        <div class="topbar-sep"></div>
        <div class="live-pill">
          <span class="live-dot"></span>
          Study Active
        </div>
        <div class="topbar-r">
          <div class="pid-chip" id="pidChip">PID —</div>
        </div>
      </header>

      <main class="main" id="main"></main>

      <footer class="footer">
        <span class="footer-logo">HumanAI × University of Alabama</span>
        <div class="f-sep"></div>
        <span>All responses anonymous</span>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
